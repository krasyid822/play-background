<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Atur playlist atau video YouTube untuk diputar sebagai audio latar, dengan kontrol putar, acak, dan mode ulangi dalam satu widget ringan.">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <meta name="theme-color" content="#2b160d">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Refleksi Ambient Audio">
    <meta property="og:description" content="Konfigurasi audio latar YouTube untuk fokus, refleksi, dan suasana kerja.">
    <meta property="og:site_name" content="Refleksi Ambient Audio">
    <meta property="og:url" content="">
    <meta property="og:image" content="./favicon.svg">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Refleksi Ambient Audio">
    <meta name="twitter:description" content="Widget audio latar YouTube dengan mode playlist atau video tunggal.">
    <meta name="twitter:image" content="./favicon.svg">
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="./manifest.webmanifest">
    <title>Refleksi Ambient Audio</title>
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebApplication",
            "name": "Refleksi Ambient Audio",
            "applicationCategory": "MusicApplication",
            "operatingSystem": "Any",
            "description": "Aplikasi web untuk mengatur dan memutar audio latar dari YouTube dengan kontrol playlist.",
            "inLanguage": "id-ID"
        }
    </script>
    <script>
        (function () {
            const canonicalHref = window.location.origin + window.location.pathname;
            const canonical = document.createElement('link');
            canonical.rel = 'canonical';
            canonical.href = canonicalHref;
            document.head.appendChild(canonical);

            const ogUrl = document.querySelector('meta[property="og:url"]');
            if (ogUrl) {
                ogUrl.setAttribute('content', canonicalHref);
            }
        })();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        :root {
            --bg-a: #26120a;
            --bg-b: #0b1510;
            --card: #1f130c;
            --card-glow: #2f1c10;
            --text: #ffe8b7;
            --muted: #dfc58f;
            --accent: #f59e0b;
            --accent-2: #f97316;
            --accent-soft: #fde68a;
            --ok: #9bf2a8;
            --border: #74411f;
            --bevel-light: #a86a3f;
            --bevel-dark: #140a06;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'VT323', 'Courier New', monospace;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 12%, rgba(249, 115, 22, 0.22), transparent 42%),
                radial-gradient(circle at 80% 70%, rgba(253, 230, 138, 0.14), transparent 38%),
                linear-gradient(130deg, var(--bg-a), var(--bg-b));
            padding: 28px 16px 100px;
            letter-spacing: 0.03em;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.04) 0,
                rgba(255, 255, 255, 0.04) 1px,
                transparent 1px,
                transparent 3px
            );
            opacity: 0.35;
        }

        .container {
            width: min(760px, 100%);
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border: 3px solid var(--border);
            border-radius: 6px;
            box-shadow:
                inset 0 0 0 2px var(--bevel-light),
                inset 0 0 0 5px var(--bevel-dark),
                0 14px 0 rgba(0, 0, 0, 0.25),
                0 24px 40px rgba(0, 0, 0, 0.45);
            padding: 22px;
            position: relative;
            overflow: hidden;
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to bottom, rgba(255, 255, 255, 0.06), transparent 24%),
                repeating-linear-gradient(
                    90deg,
                    rgba(255, 255, 255, 0.03) 0,
                    rgba(255, 255, 255, 0.03) 2px,
                    transparent 2px,
                    transparent 7px
                );
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: 0.6;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1rem;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            line-height: 1.55;
            color: var(--accent-soft);
            text-shadow: 2px 2px 0 #2a1409;
            text-transform: uppercase;
        }

        .subtitle {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 1.6rem;
            line-height: 1.2;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 400;
            font-size: 1.45rem;
            text-transform: uppercase;
            color: var(--accent-soft);
        }

        select,
        input {
            width: 100%;
            border: 2px solid var(--bevel-light);
            border-radius: 4px;
            padding: 10px 12px;
            font-size: 1.35rem;
            color: var(--text);
            background: linear-gradient(180deg, #351f12, var(--card-glow));
            box-shadow: inset 0 0 0 2px var(--bevel-dark);
            font-family: 'VT323', 'Courier New', monospace;
            letter-spacing: 0.03em;
        }

        select:focus,
        input:focus {
            outline: 0;
            border-color: var(--accent);
            box-shadow: inset 0 0 0 2px var(--bevel-dark), 0 0 0 2px rgba(245, 158, 11, 0.25);
        }

        select option {
            background: #27160d;
            color: #ffe8b7;
        }

        select option:checked,
        select option:hover {
            background: #4a2c18;
            color: #fff2cc;
        }

        .hint {
            margin-top: 6px;
            font-size: 1.2rem;
            color: var(--muted);
        }

        .actions {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            border: 2px solid var(--bevel-light);
            border-radius: 4px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 1.15rem;
            font-weight: 400;
            text-transform: uppercase;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            letter-spacing: 0.08em;
            transition: transform 120ms ease, filter 120ms ease;
        }

        .btn-primary {
            color: #2b1208;
            background: linear-gradient(180deg, #fcd34d, var(--accent));
            box-shadow: 0 4px 0 #8b4f19;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .btn-primary:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8b4f19;
        }

        .btn-light {
            color: var(--text);
            background: linear-gradient(180deg, #4f311f, #382016);
        }

        .status {
            margin-top: 12px;
            min-height: 22px;
            font-size: 1.4rem;
            color: var(--ok);
            font-weight: 400;
            text-shadow: 0 0 8px rgba(155, 242, 168, 0.32);
        }

        @media (max-width: 680px) {
            .card {
                padding: 16px;
                border-radius: 4px;
            }

            h1 {
                font-size: 0.82rem;
            }

            .subtitle {
                font-size: 1.35rem;
            }

            label {
                font-size: 1.2rem;
            }

            select,
            input {
                font-size: 1.2rem;
            }

            button {
                font-size: 0.78rem;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Pengaturan YouTube Background Audio</h1>
            <p class="subtitle">Pilih mode audio, isi ID, lalu simpan. Widget audio di kanan bawah akan otomatis memakai konfigurasi terbaru.</p>

            <form id="audio-config-form" class="grid">
                <div>
                    <label for="source-mode">Mode sumber</label>
                    <select id="source-mode" name="mode">
                        <option value="playlist">Playlist</option>
                        <option value="video">Video tunggal</option>
                    </select>
                </div>

                <div>
                    <label for="source-id">ID YouTube</label>
                    <input
                        id="source-id"
                        name="id"
                        type="text"
                        placeholder="Contoh: PLxxxx (playlist) atau dQw4w9WgXcQ (video)"
                        required
                    >
                    <p id="source-hint" class="hint">Masukkan Playlist ID (misal: PL...).</p>
                </div>

                <div class="actions">
                    <button class="btn-primary" type="submit">Simpan Konfigurasi</button>
                </div>
            </form>

            <p id="status-text" class="status" aria-live="polite"></p>
        </section>
    </main>

    <script>
        (function () {
            const DEFAULTS = {
                playlist: 'PLdktW6Lk1MUYZTkC23UIZa6Ao3EKjrrMn',
                video: ''
            };
            const STORAGE_KEY = 'refleksi-ambient-audio-source-config';

            const form = document.getElementById('audio-config-form');
            const modeField = document.getElementById('source-mode');
            const idField = document.getElementById('source-id');
            const hint = document.getElementById('source-hint');
            const status = document.getElementById('status-text');

            function updateHint(mode) {
                if (mode === 'video') {
                    hint.textContent = 'Masukkan Video ID (contoh: dQw4w9WgXcQ).';
                } else {
                    hint.textContent = 'Masukkan Playlist ID (biasanya diawali PL...).';
                }
            }

            function loadConfig() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) {
                        return { mode: 'playlist', id: DEFAULTS.playlist };
                    }

                    const parsed = JSON.parse(raw);
                    const mode = parsed && parsed.mode === 'video' ? 'video' : 'playlist';
                    const id = parsed && typeof parsed.id === 'string' && parsed.id.trim()
                        ? parsed.id.trim()
                        : (mode === 'video' ? DEFAULTS.video : DEFAULTS.playlist);

                    return { mode: mode, id: id };
                } catch (error) {
                    return { mode: 'playlist', id: DEFAULTS.playlist };
                }
            }

            function saveConfig(config) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
                window.dispatchEvent(new CustomEvent('refleksi:ambient-audio-config-updated', {
                    detail: config
                }));
            }

            function fillForm(config) {
                modeField.value = config.mode;
                idField.value = config.id;
                updateHint(config.mode);
            }

            modeField.addEventListener('change', function () {
                updateHint(modeField.value);
                if (!idField.value.trim()) {
                    idField.value = modeField.value === 'video' ? DEFAULTS.video : DEFAULTS.playlist;
                }
            });

            form.addEventListener('submit', function (event) {
                event.preventDefault();
                const mode = modeField.value === 'video' ? 'video' : 'playlist';
                const value = idField.value.trim();

                if (!value) {
                    status.textContent = 'ID tidak boleh kosong.';
                    return;
                }

                const config = { mode: mode, id: value };
                saveConfig(config);
                status.textContent = 'Konfigurasi tersimpan dan diterapkan ke widget audio.';
            });

            fillForm(loadConfig());
        })();
    </script>

    <script src="./audio-player.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('./sw.js').catch(function () {
                    // noop: app should continue even when SW registration fails
                });
            });
        }
    </script>
</body>
</html>
