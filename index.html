<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refleksi Ambient Audio | Widget YouTube Background PWA</title>
    <meta name="description" content="Widget YouTube background audio bergaya retro dengan mode playlist, repeat, shuffle, dan dukungan PWA untuk pengalaman yang lebih cepat dan stabil.">
    <meta name="robots" content="index,follow">
    <meta name="theme-color" content="#17120d">
    <meta name="color-scheme" content="light dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Refleksi Ambient Audio">
    <meta name="application-name" content="Refleksi Ambient Audio">
    <link rel="canonical" href="./">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon-192.svg" type="image/svg+xml" sizes="192x192">
    <link rel="icon" href="./icon-512.svg" type="image/svg+xml" sizes="512x512">
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icon-192.svg">
    <meta property="og:title" content="Refleksi Ambient Audio">
    <meta property="og:description" content="Widget audio YouTube retro dengan playlist, repeat, shuffle, dan mode PWA untuk pengalaman yang lebih responsif.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="./">
    <meta property="og:image" content="./favicon.svg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Refleksi Ambient Audio">
    <meta name="twitter:description" content="Widget audio YouTube retro dengan mode playlist, repeat, shuffle, dan dukungan PWA.">
    <meta name="twitter:image" content="./favicon.svg">
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebApplication",
            "name": "Refleksi Ambient Audio",
            "description": "Widget YouTube background audio bergaya retro dengan playlist, repeat, shuffle, dan dukungan PWA.",
            "applicationCategory": "MusicApplication",
            "operatingSystem": "Web",
            "inLanguage": "id",
            "url": "./",
            "isAccessibleForFree": true
        }
    </script>
    <style>
        :root {
            --bg-a: #f3f4f6;
            --bg-b: #dbeafe;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #334155;
            --accent: #1d4ed8;
            --accent-2: #0f172a;
            --border: rgba(15, 23, 42, 0.14);
            --ok: #166534;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 18%, rgba(37, 99, 235, 0.22), transparent 40%),
                radial-gradient(circle at 80% 74%, rgba(15, 23, 42, 0.16), transparent 36%),
                linear-gradient(120deg, var(--bg-a), var(--bg-b));
            padding: 28px 16px 100px;
        }

        .container {
            width: min(760px, 100%);
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.14);
            padding: 20px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.45rem;
        }

        .subtitle {
            margin: 0 0 16px;
            color: var(--muted);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.92rem;
        }

        select,
        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.95rem;
            color: var(--text);
            background: #fff;
        }

        select option {
            background: #ffffff;
            color: #0f172a;
        }

        select option:checked,
        select option:hover {
            background: #dbeafe;
            color: #0f172a;
        }

        .hint {
            margin-top: 6px;
            font-size: 0.84rem;
            color: var(--muted);
        }

        .actions {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 0.92rem;
            font-weight: 600;
        }

        .btn-primary {
            color: #fff;
            background: linear-gradient(135deg, var(--accent-2), var(--accent));
        }

        .btn-light {
            color: var(--text);
            background: #e2e8f0;
        }

        .btn-install {
            color: #052b28;
            background: linear-gradient(135deg, #7ef0d8, #f4b23a);
            border: 1px solid rgba(15, 23, 42, 0.18);
        }

        .btn-install:hover {
            filter: saturate(1.04);
        }

        .status {
            margin-top: 12px;
            min-height: 22px;
            font-size: 0.88rem;
            color: var(--ok);
            font-weight: 600;
        }

        @media (max-width: 680px) {
            .card {
                padding: 16px;
                border-radius: 14px;
            }

            h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Pengaturan YouTube Background Audio</h1>
            <p class="subtitle">Pilih mode audio, isi ID, lalu simpan. Widget audio di kanan bawah akan otomatis memakai konfigurasi terbaru.</p>

            <form id="audio-config-form" class="grid">
                <div>
                    <label for="source-mode">Mode sumber</label>
                    <select id="source-mode" name="mode">
                        <option value="playlist">Playlist</option>
                        <option value="video">Video tunggal</option>
                    </select>
                </div>

                <div>
                    <label for="source-id">ID YouTube</label>
                    <input
                        id="source-id"
                        name="id"
                        type="text"
                        placeholder="Contoh: PLxxxx (playlist) atau dQw4w9WgXcQ (video)"
                        required
                    >
                    <p id="source-hint" class="hint">Masukkan Playlist ID (misal: PL...).</p>
                </div>

                <div class="actions">
                    <button class="btn-primary" type="submit">Simpan Konfigurasi</button>
                    <button id="install-pwa-button" class="btn-light btn-install" type="button" hidden>Instal Aplikasi</button>
                </div>
            </form>

            <p id="pwa-status" class="hint">Instal aplikasi untuk membuka widget sebagai PWA dan akses yang lebih cepat.</p>
            <p id="status-text" class="status" aria-live="polite"></p>
        </section>
    </main>

    <script>
        (function () {
            const DEFAULTS = {
                playlist: 'PLdktW6Lk1MUYZTkC23UIZa6Ao3EKjrrMn',
                video: ''
            };
            const STORAGE_KEY = 'refleksi-ambient-audio-source-config';

            const form = document.getElementById('audio-config-form');
            const modeField = document.getElementById('source-mode');
            const idField = document.getElementById('source-id');
            const hint = document.getElementById('source-hint');
            const installButton = document.getElementById('install-pwa-button');
            const pwaStatus = document.getElementById('pwa-status');
            const status = document.getElementById('status-text');
            let deferredInstallPrompt = null;

            function isStandaloneApp() {
                return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
            }

            function updateInstallButton() {
                if (!installButton) {
                    return;
                }

                installButton.hidden = !deferredInstallPrompt || isStandaloneApp();
            }

            function updateHint(mode) {
                if (mode === 'video') {
                    hint.textContent = 'Masukkan Video ID (contoh: dQw4w9WgXcQ).';
                } else {
                    hint.textContent = 'Masukkan Playlist ID (biasanya diawali PL...).';
                }
            }

            function loadConfig() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) {
                        return { mode: 'playlist', id: DEFAULTS.playlist };
                    }

                    const parsed = JSON.parse(raw);
                    const mode = parsed && parsed.mode === 'video' ? 'video' : 'playlist';
                    const id = parsed && typeof parsed.id === 'string' && parsed.id.trim()
                        ? parsed.id.trim()
                        : (mode === 'video' ? DEFAULTS.video : DEFAULTS.playlist);

                    return { mode: mode, id: id };
                } catch (error) {
                    return { mode: 'playlist', id: DEFAULTS.playlist };
                }
            }

            function saveConfig(config) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
                window.dispatchEvent(new CustomEvent('refleksi:ambient-audio-config-updated', {
                    detail: config
                }));
            }

            function fillForm(config) {
                modeField.value = config.mode;
                idField.value = config.id;
                updateHint(config.mode);
            }

            if (installButton) {
                installButton.addEventListener('click', function () {
                    if (!deferredInstallPrompt) {
                        status.textContent = 'Prompt instal belum tersedia.';
                        return;
                    }

                    deferredInstallPrompt.prompt();
                    deferredInstallPrompt.userChoice.then(function (choice) {
                        if (choice && choice.outcome === 'accepted') {
                            status.textContent = 'Aplikasi berhasil diinstal.';
                        } else {
                            status.textContent = 'Instalasi dibatalkan.';
                        }

                        deferredInstallPrompt = null;
                        updateInstallButton();
                    });
                });
            }

            window.addEventListener('beforeinstallprompt', function (event) {
                event.preventDefault();
                deferredInstallPrompt = event;
                updateInstallButton();
            });

            window.addEventListener('appinstalled', function () {
                deferredInstallPrompt = null;
                updateInstallButton();
                status.textContent = 'Aplikasi berhasil diinstal ke perangkat.';
            });

            updateInstallButton();

            if (isStandaloneApp()) {
                if (pwaStatus) {
                    pwaStatus.textContent = 'Aplikasi sudah berjalan dalam mode terpasang.';
                }
            }

            modeField.addEventListener('change', function () {
                updateHint(modeField.value);
                if (!idField.value.trim()) {
                    idField.value = modeField.value === 'video' ? DEFAULTS.video : DEFAULTS.playlist;
                }
            });

            form.addEventListener('submit', function (event) {
                event.preventDefault();
                const mode = modeField.value === 'video' ? 'video' : 'playlist';
                const value = idField.value.trim();

                if (!value) {
                    status.textContent = 'ID tidak boleh kosong.';
                    return;
                }

                const config = { mode: mode, id: value };
                saveConfig(config);
                status.textContent = 'Konfigurasi tersimpan dan diterapkan ke widget audio.';
            });

            fillForm(loadConfig());
        })();
    </script>

    <script src="./audio-player.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('./sw.js').catch(function () {
                    // ignore
                });
            });
        }
    </script>
</body>
</html>
